{% extends "layout.html" %}
{% block title %}
Login
{% endblock title %}
{% block main %}
<div class="container-fluid">
    <div class="row">
        <form class="mt-5" action="/login" method="post">
            <div class="col-md-6 offset-md-3">
                {% if message %}
                <div class="alert alert-danger show fade alert-dismissible"
                    role="alert">
                    {{ message }}
                    <button type="button" class="btn-close"
                        data-bs-dismiss="alert" aria-label="close"></button>
                </div>
                {% endif %}
                <h1 class="text-center">LOGIN</h1>
                <i class="fa-solid fa-user block"></i>
                <label class="form-label fw-bold ms-1" for="username">Username</label>
                <input class="form-control shadow" type="text" name="username"
                    autocomplete="off" autofocus placeholder="Email"
                    id="username">
                <i class="fa-solid fa-lock"></i>
                <label class="form-label mt-1 fw-bold ms-1" for="Password">Password</label>
                <div class="position-relative">
                    <i id="icon" class="position-absolute eye fa-solid fa-eye"
                        onclick="myShow()"></i>
                    <input class="form-control shadow" type="password"
                        name="password" autocomplete="off" autofocus
                        placeholder="Password" id="Password">
                </div>
                <button type="submit" class="btn bg-primary mt-3 text-light
                    shadow">Login</button>
            </div>
        </form>
    </div>
</div>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-4 offset-md-4">
            <img class="img-fluid" src="/static/images/Cycle5.png"
                alt="cycle-image">
        </div>
    </div>
</div>
<script type="text/javascript">
    function myShow() {
    var y = document.getElementById("icon");
    var x = document.getElementById("Password");
    if (x.type === "password"){
    x.type = "text";
    y.className = "position-absolute eye fa-solid fa-eye-slash";
    }
    else {
    x.type ="password";
    y.className = "position-absolute fa-sharp fa-solid fa-eye eye";
    }
    }
    </script>
{% endblock main %}
