{% extends "layout.html" %}
{% block title %}
Edit profile
{% endblock title %}
{% block main %}
<section class="vh-100 gradient-custom mb-3 mt-4">
    <div class="container py-3 h-100">
        <div class="row justify-content-center align-items-center h-100">
            <div class="col-12 col-lg-9 col-xl-10">
                <div class="card shadow-2-strong card-registration shadow"
                    style="border-radius: 8px; background: rgba(256, 256, 256,
                    0.4);">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="mb-4 pb-2 pb-md-0 mb-md-5 text-center
                            fw-bold"> EDIT YOUR PROFILE</h1>
                        <form action="/edit" method="post"
                            enctype="multipart/form-data">
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <div class="form-outline">
                                        <label class="form-label"
                                            for="firstName">First Name
                                        </label>
                                        <input type="text" id="firstName"
                                            class="form-control form-control-lg"
                                            name="firstName" value="{{
                                            profile['firstname']|default('') }}"
                                            required />
                                    </div>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <div class="form-outline">
                                        <label class="form-label"
                                            for="lastName">Last Name
                                        </label>
                                        <input type="text" id="lastName"
                                            class="form-control form-control-lg"
                                            name="lastName" value="{{
                                            profile['lastname']|default('') }}"
                                            required/>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-4 pb-2">
                                    <div class="form-outline">
                                        <label class="form-label"
                                            for="emailAddress">Email
                                        </label>
                                        <input type="email" id="emailAddress"
                                            class="form-control form-control-lg"
                                            name="emailAddress" value="{{
                                            profile['email']|default('') }}"
                                            required/>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-4 pb-2">
                                    <div class="form-outline">
                                        <label class="form-label"
                                            for="phoneNumber">Phone Number
                                        </label>
                                        <input type="tel" id="phoneNumber"
                                            class="form-control form-control-lg"
                                            name="phoneNumber" value="{{
                                            profile['phone_number']|default('')
                                            }}" required/>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-4 pb-2">
                                    <div class="form-outline">
                                        <label class="form-label"
                                            for="homeAddress">Home Address
                                        </label>
                                        <input type="Address" id="homeAddress"
                                            class="form-control form-control-lg"
                                            name="homeAddress" value="{{
                                            profile['address']|default('') }}"
                                            required/>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-4 pb-2">
                                    <div class="form-outline">
                                        <label class="form-label"
                                            for="cnicNumber">Cnic
                                        </label>
                                        <input type="text" id="cnicNumber"
                                            class="form-control form-control-lg"
                                            name="cnicNumber" value="{{
                                            profile['cnic']|default('') }}"
                                            required/>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <input type="file" id="homeAddress"
                                    class="form-control form-control-lg"
                                    name="file" value="{{
                                    profile['profile_image']|default('') }}"
                                    required/>
                            </div>
                            <div class="mt-4 pt-2">
                                <input class="btn btn-primary btn-lg"
                                    type="submit" value="Submit"/>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% include "footer.html" %}
{% endblock main %}
