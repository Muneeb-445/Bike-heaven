{% extends "layout.html" %}
{% block title %}
Register
{% endblock title %}
{% block main %}
<section class="vh-100">
    <div class="container h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-lg-12 col-xl-11 mt-5">
                <div class="card text-black bg-secondary" style="border-radius:
                    1px; --bs-bg-opacity: .4">
                    <div class="card-body p-md-5">
                        <div class="row justify-content-center">
                            <div class="col-md-12 col-lg-6 col-xl-5
                                order-2
                                order-lg-1">
                                {% if message %}
                                <div class="alert alert-danger show fade
                                    alert-dismissible" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close"
                                        data-bs-dismiss="alert"
                                        aria-label="close">
                                    </button>
                                </div>
                                {% endif %}
                                <p class="text-center h1 fw-bold mb-5 mx-1
                                    mx-md-4 mt-4">Register</p>
                                <form class="mx-1 mx-md-4" action="/register"
                                    method="post">
                                    <div class="d-flex flex-row
                                        align-items-center mb-4">
                                        <div class="form-outline flex-fill
                                            mb-0">
                                            <i class="fas fa-user fa-lg fa-fw"></i>
                                            <label class="form-label"
                                                for="form3Example1c">Your Name</label>
                                            <input type="text"
                                                id="form3Example1c"
                                                class="form-control"
                                                name="username" required />
                                        </div>
                                    </div>
                                    <div class="d-flex flex-row
                                        align-items-center mb-3">
                                        <div class="form-outline flex-fill
                                            mb-0">
                                            <i class="fas fa-lock fa-lg fa-fw"></i>
                                            <label class="form-label"
                                                for="form3Example4c">Password</label>
                                            <input type="password"
                                                id="form3Example4c"
                                                class="form-control"
                                                name="password"
                                                required />
                                        </div>
                                    </div>
                                    <div class="d-flex flex-row
                                        align-items-center mb-4">
                                        <div class="form-outline flex-fill
                                            mb-0">
                                            <i class="fas fa-key fa-lg fa-fw"></i>
                                            <label class="form-label"
                                                for="form3Example4cd">Repeat
                                                your password</label>
                                            <input type="password"
                                                id="form3Example4cd"
                                                class="form-control"
                                                name="confirmation" required />
                                        </div>
                                    </div>
                                    <div class="form-check d-flex
                                        justify-content-center mb-4">
                                        <input class="form-check-input me-2"
                                            type="checkbox" id="form2Example3c"
                                            name="checkbox" required />
                                        <label class="form-check-label"
                                            for="form2Example3">
                                            I agree all statements in <a
                                                href="#!">Terms of service</a>
                                        </label>
                                    </div>
                                    <div class="d-flex justify-content-center
                                        mx-4 mb-3 mb-lg-4">
                                        <button type="submit" class="btn
                                            btn-primary btn-lg">Register</button>
                                    </div>
                                </form>
                            </div>
                            <div class="col-md-10 col-lg-6 col-xl-7 d-flex
                                align-items-center order-1 order-lg-2">
                                <img src="/static/images/product3.png"
                                    class="img-fluid" alt="Sample image"
                                    width="600px">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock main %}
